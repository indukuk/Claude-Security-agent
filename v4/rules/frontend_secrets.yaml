rules:
  - id: hardcoded-api-key-js
    pattern-either:
      - pattern: |
          const $VAR = "..."
      - pattern: |
          let $VAR = "..."
      - pattern: |
          var $VAR = "..."
    metavariable-regex:
      metavariable: $VAR
      regex: ".*(api_key|apiKey|API_KEY|x_api_key|xApiKey).*"
    message: |
      API key hardcoded in client-side JavaScript. This key is
      visible to any user who views page source. Use environment
      variables or a backend proxy for API key management.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: CWE-798
      category: secret-exposure
      confidence: HIGH

  - id: hardcoded-api-key-header-js
    patterns:
      - pattern: |
          "x-api-key": "..."
      - pattern-not: |
          "x-api-key": $VAR
    message: |
      API key hardcoded in HTTP header configuration. Rotate this
      key and move it to server-side configuration.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: CWE-798
      category: secret-exposure
      confidence: HIGH

  - id: aws-credentials-in-js
    pattern-either:
      - pattern: |
          $VAR = "AKIA..."
      - pattern: |
          accessKeyId: "AKIA..."
    message: |
      AWS access key appears to be hardcoded in client-side code.
      Never embed AWS credentials in frontend code.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: CWE-798
      category: secret-exposure
      confidence: HIGH

  - id: bearer-token-hardcoded-js
    patterns:
      - pattern: |
          "Authorization": "Bearer ..."
    message: |
      Bearer token hardcoded in client code. Tokens should be
      obtained dynamically via authentication flows.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: CWE-798
      category: secret-exposure
      confidence: HIGH
